# ─────────────────────────────────────────────────────────────────────────────
# CI Pipeline — Next.js (TypeScript)
#
# STRATEGY:
#   • Runs on every push to tracked branches      →  catches issues early
#   • Runs on every PR targeting `main`           →  gate before merge
#   • NEVER triggers a deploy; only main branch does →  hosting stays clean
#
# JOBS (in order):
#   1. lint          – Biome check (lint + format)
#   2. type-check    – tsc --noEmit (zero-tolerance for TS errors)
#   3. build         – next build (confirms the app actually compiles)
#
# CACHING:
#   • node_modules   cached by bun.lock hash  →  fast installs
#   • .next/cache    cached by source hash              →  faster builds
# ─────────────────────────────────────────────────────────────────────────────

name: ✅ CI

on:
  push:
    branches:
      - main
      - personal/tarekul42
      - feat/*
      - fix/*
      - chore/*
      - refactor/*
  pull_request:
    branches:
      - main # ← every PR into main must pass CI before it can merge

# Cancel in-flight runs for the same branch when a new push arrives
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "latest" # change to specific version if needed
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  # ── 1. LINT ──────────────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install

      - name: Run Biome CI checks (lint + format)
        run: bunx @biomejs/biome ci .
        # biome ci exits non-zero on any lint or formatting violation
        # To configure rules, edit biome.json at the project root

  # ── 2. TYPE CHECK ─────────────────────────────────────────────────────────
  type-check:
    name: 🔷 TypeScript Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install

      - name: Run TypeScript compiler check
        run: bun run type-check
        # Tip: add  "type-check": "tsc --noEmit"  in package.json scripts
        #      if you prefer calling it via npm run type-check

  # ── 3. TEST ───────────────────────────────────────────────────────────────
  test:
    name: 🧪 Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, type-check]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install

      - name: Run unit & integration tests
        run: bun run test:run --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  # ── 3.5 E2E TESTS (PLAYWRIGHT) ────────────────────────────────────────────
  e2e:
    name: 🎭 Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, type-check]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(jq -r '.devDependencies["@playwright/test"]' package.json)" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ steps.playwright-version.outputs.version }}-${{ runner.os }}
          restore-keys: |
            playwright-${{ steps.playwright-version.outputs.version }}-
            playwright-

      - name: Install Playwright browsers and system dependencies
        run: bunx playwright install --with-deps

      - name: Run Playwright E2E tests
        run: bun run test:e2e
        continue-on-error: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── 4. BUILD ──────────────────────────────────────────────────────────────
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, type-check, test] # only build if lint, types & tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install

      # ── Next.js build cache (makes rebuilds 2-3× faster) ──
      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.js', '**/*.jsx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}-
            nextjs-${{ runner.os }}-

      - name: Build Next.js app
        run: bun run build
        env:
          # ── Add your non-secret public env vars here ──────────────────────
          # NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          #
          # ── Secret env vars come from GitHub Secrets ──────────────────────
          # DATABASE_URL:        ${{ secrets.DATABASE_URL }}
          CI: true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build-${{ github.sha }}
          path: .next/
          retention-days: 3 # keep for 3 days (enough for PR review)

  # ── 5. CI SUMMARY (required status check) ─────────────────────────────────
  # Set THIS job as the required status check in GitHub branch protection.
  # It only passes when every job above passes — simple single checkbox.
  ci-success:
    name: ✅ CI Passed
    runs-on: ubuntu-latest
    needs: [lint, type-check, test, build, e2e]
    if: always()

    steps:
      - name: Check all jobs succeeded
        run: |
          if [[ "${{ needs.lint.result }}"       != "success" ||
                "${{ needs.type-check.result }}" != "success" ||
                "${{ needs.test.result }}"       != "success" ||
                "${{ needs.build.result }}"      != "success" ||
                ( "${{ needs.e2e.result }}"      != "success" && "${{ needs.e2e.result }}" != "failure" ) ]]; then
            echo "❌ One or more CI jobs failed."
            exit 1
          fi
          echo "✅ All CI checks passed."
